<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Do! — Corporate Events</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='4' y='26' font-size='26'>💍</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Jost', sans-serif;
      background: #0f1318;
      color: #e8e4dc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .wrap { max-width: 560px; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(40px, 6vw, 68px);
      color: #c9ab82;
      margin-bottom: 16px;
      line-height: 1;
    }
    p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: rgba(232,228,220,0.7);
      font-size: 18px;
      margin-bottom: 40px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 16px 32px;
      color: #e8e4dc;
      border: 1px solid rgba(201,171,130,0.5);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      transition: all 0.4s ease;
    }
    a:hover { background: #c9ab82; color: #0f1318; border-color: #c9ab82; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Coming Soon</h1>
    <p>The corporate side of our studio is being crafted with the same care. Quiet luxury, meaningful moments — returning shortly.</p>
    <a href="/">← Back to Landing</a>
  </div>
</body>
</html>
